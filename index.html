<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Kierowcy Melex v1.0</title>
    <style>
        /* CSS - WYGLĄD SYSTEMU */
        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --text: #333;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--bg); color: var(--text); touch-action: manipulation; }
        #app { width: 100%; max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--card); position: relative; overflow-x: hidden; }

        .screen { display: none; padding: 20px; box-sizing: border-box; flex-direction: column; min-height: 100vh; }
        .active { display: flex; }

        /* Nagłówek */
        .header { background: #222; color: white; padding: 15px; display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; }

        /* Przyciski */
        .btn { padding: 18px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; color: white; margin: 8px 0; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .btn-main { background: var(--primary); height: 120px; font-size: 28px; }
        .btn-sub { background: #6c757d; }
        .btn-green { background: var(--success); }
        .btn-red { background: var(--danger); }
        .btn-yellow { background: var(--warning); color: black; }

        /* Grid dla dashboardu */
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

        /* Formularze */
        input, select, textarea { padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; }
        
        /* Licznik osób */
        .counter-box { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 20px 0; }
        .count-val { font-size: 40px; font-weight: bold; min-width: 60px; text-align: center; }
        .btn-circle { width: 60px; height: 60px; border-radius: 50%; font-size: 24px; }

        /* Suwak (Slider) */
        .slider-container { background: #eee; height: 70px; border-radius: 35px; position: relative; margin: 20px 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .slider-text { position: absolute; font-weight: bold; color: #777; pointer-events: none; }
        .slider-handle { position: absolute; left: 5px; width: 60px; height: 60px; background: white; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; z-index: 2; }

        /* Specyficzne kolory suwaków */
        .slide-finish { background: linear-gradient(to right, var(--success), #ddd); }
        .slide-logout { background: linear-gradient(to right, var(--danger), #ddd); }

        /* Stoper */
        .timer-display { font-size: 48px; font-weight: bold; text-align: center; font-family: monospace; margin: 20px 0; }
    </style>
</head>
<body>

<div id="app">
    <div id="scr-login" class="screen active">
        <h1 style="text-align: center;">WITAJ</h1>
        <label>Kierowca:</label>
        <select id="login-driver">
            <option value="Jan">Jan</option>
            <option value="Marek">Marek</option>
            <option value="Anna">Anna</option>
        </select>
        <label>Pojazd:</label>
        <select id="login-vehicle">
            <option value="Delfin 01">Delfin 01</option>
            <option value="Delfin 02">Delfin 02</option>
            <option value="Rekin 05">Rekin 05</option>
        </select>
        <input type="password" id="login-pin" placeholder="KOD PIN (4 cyfry)" inputmode="numeric">
        <button class="btn btn-green" onclick="app.login()">ZALOGUJ</button>
    </div>

    <div id="scr-dash" class="screen">
        <div class="header">
            <span id="dash-user">👤 Kierowca</span>
            <span id="dash-veh">🛺 Pojazd</span>
        </div>
        <button class="btn btn-main" onclick="app.nav('scr-start')">🚀 START</button>
        <button class="btn btn-sub" onclick="app.nav('scr-transfer')">📲 WYŚLIJ KURS</button>
        <div class="grid-3">
            <button class="btn btn-sub" onclick="app.nav('scr-info')">ℹ️ INFO</button>
            <button class="btn btn-red" onclick="app.nav('scr-fault')">🛠️ AW</button>
            <button class="btn btn-red" onclick="app.nav('scr-logout')">🚪 WYLOG</button>
        </div>
    </div>

    <div id="scr-start" class="screen">
        <h2>NOWY KURS</h2>
        <select id="trip-type" onchange="app.toggleTour(this.value)">
            <option value="KURS">KURS STANDARDOWY</option>
            <option value="WYCIECZKA">WYCIECZKA</option>
        </select>
        
        <div id="tour-section" style="display:none; border: 1px dashed #ccc; padding: 10px;">
            <label><input type="checkbox" value="Objazd"> Objazd Miasta</label><br>
            <label><input type="checkbox" value="Przekop"> Przekop Mierzei</label><br>
            <label><input type="checkbox" value="Piaski"> Piaski</label>
        </div>

        <div class="counter-box">
            <button class="btn btn-sub btn-circle" onclick="app.adjPeople(-1)">-</button>
            <span id="trip-people" class="count-val">0</span>
            <button class="btn btn-sub btn-circle" onclick="app.adjPeople(1)">+</button>
        </div>
        
        <button id="btn-go" class="btn btn-green" onclick="app.startTrip()" disabled>>>> RUSZAJ! >>></button>
        <button class="btn btn-sub" onclick="app.nav('scr-dash')">ANULUJ</button>
    </div>

    <div id="scr-trip" class="screen">
        <div class="timer-display" id="trip-timer">00:00:00</div>
        <div class="counter-box">
            <span style="font-size: 20px;">W pojeździe: </span>
            <span id="on-trip-people" class="count-val">0</span>
        </div>
        <button class="btn btn-sub" onclick="app.adjPeople(1, true)">👤 DOSIADKA</button>
        <button class="btn btn-yellow" id="btn-pause" onclick="app.togglePause()">🛑 START POSTÓJ</button>
        
        <div class="slider-container slide-finish">
            <div class="slider-text">PRZESUŃ BY ROZLICZYĆ 🏁</div>
            <div id="finish-handle" class="slider-handle">>>></div>
        </div>
    </div>

    <div id="scr-pay" class="screen">
        <h2>ROZLICZENIE</h2>
        <div style="font-size: 20px; margin-bottom: 20px;">
            Czas: <span id="final-time">--</span><br>
            Osób (max): <span id="final-people">--</span>
        </div>
        <label>Gotówka (PLN):</label>
        <input type="number" id="pay-cash" value="0" oninput="app.calcSum()">
        <label>Blik/Terminal (PLN):</label>
        <input type="number" id="pay-blik" value="0" oninput="app.calcSum()">
        <h1 style="text-align: center; color: var(--success);">SUMA: <span id="pay-total">0</span> PLN</h1>
        <button class="btn btn-green" onclick="app.finishTrip()">✅ ZATWIERDŹ I ZAMKNIJ</button>
        <button class="btn btn-sub" onclick="app.nav('scr-trip')">POWRÓT</button>
    </div>

    <div id="scr-logout" class="screen">
        <h2>STATUS PRACY</h2>
        <div class="slider-container" style="background: #fff3cd;">
            <div class="slider-text">PRZESUŃ: PRZERWA 🟡</div>
            <div id="pause-handle" class="slider-handle">>>></div>
        </div>
        
        <div class="slider-container slide-logout">
            <div class="slider-text">PRZESUŃ: KONIEC PRACY 🔴</div>
            <div id="logout-handle" class="slider-handle">>>></div>
        </div>
        <button class="btn btn-sub" onclick="app.nav('scr-dash')">POWRÓT</button>
    </div>
</div>

<script>
    /* JAVASCRIPT - LOGIKA SYSTEMU */
    const SCRIPT_URL = '
https://script.google.com/macros/s/AKfycbzoDFnFmYowCTmTF177ePbvmKsyTIL5CbfjGwypjYPVVJNWi2LIZfHom0mrNPUdM5r5/exec'; // LINK Z GOOGLE APPS SCRIPT

    const app = {
        state: {
            driver: '',
            vehicle: '',
            people: 0,
            maxPeople: 0,
            startTime: null,
            timerInterval: null,
            paused: false,
            elapsed: 0
        },

        nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        },

        login() {
            this.state.driver = document.getElementById('login-driver').value;
            this.state.vehicle = document.getElementById('login-vehicle').value;
            document.getElementById('dash-user').innerText = "👤 " + this.state.driver;
            document.getElementById('dash-veh').innerText = "🛺 " + this.state.vehicle;
            this.send('LOGIN', { kierowca: this.state.driver, pojazd: this.state.vehicle });
            this.nav('scr-dash');
        },

        adjPeople(val, onTrip = false) {
            this.state.people = Math.max(0, this.state.people + val);
            if(this.state.people > this.state.maxPeople) this.state.maxPeople = this.state.people;
            
            document.getElementById('trip-people').innerText = this.state.people;
            document.getElementById('on-trip-people').innerText = this.state.people;
            document.getElementById('btn-go').disabled = (this.state.people === 0);
        },

        toggleTour(val) {
            document.getElementById('tour-section').style.display = (val === 'WYCIECZKA') ? 'block' : 'none';
        },

        startTrip() {
            this.state.startTime = new Date();
            this.state.maxPeople = this.state.people;
            this.startTimer();
            const type = document.getElementById('trip-type').value;
            this.send('START_KURS', { 
                kierowca: this.state.driver, 
                pojazd: this.state.vehicle, 
                typ: type, 
                osoby: this.state.people,
                gps: "Pobieranie..." 
            });
            this.nav('scr-trip');
        },

        startTimer() {
            clearInterval(this.state.timerInterval);
            this.state.elapsed = 0;
            this.state.timerInterval = setInterval(() => {
                if(!this.state.paused) {
                    this.state.elapsed++;
                    const hrs = Math.floor(this.state.elapsed / 3600).toString().padStart(2, '0');
                    const mins = Math.floor((this.state.elapsed % 3600) / 60).toString().padStart(2, '0');
                    const secs = (this.state.elapsed % 60).toString().padStart(2, '0');
                    document.getElementById('trip-timer').innerText = `${hrs}:${mins}:${secs}`;
                }
            }, 1000);
        },

        togglePause() {
            this.state.paused = !this.state.paused;
            document.getElementById('btn-pause').innerText = this.state.paused ? "▶️ WZNÓW KURS" : "🛑 START POSTÓJ";
            document.getElementById('btn-pause').style.background = this.state.paused ? "var(--primary)" : "var(--warning)";
        },

        calcSum() {
            const cash = parseFloat(document.getElementById('pay-cash').value) || 0;
            const blik = parseFloat(document.getElementById('pay-blik').value) || 0;
            document.getElementById('pay-total').innerText = (cash + blik).toFixed(2);
        },

        finishTrip() {
            const cash = document.getElementById('pay-cash').value;
            const blik = document.getElementById('pay-blik').value;
            this.send('KONIEC_KURS', {
                kierowca: this.state.driver,
                gotowka: cash,
                blik: blik,
                gps: "Zakończono"
            });
            clearInterval(this.state.timerInterval);
            this.state.people = 0;
            this.adjPeople(0);
            this.nav('scr-dash');
        },

        send(action, payload) {
            payload.action = action;
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            }).catch(e => console.log("Błąd bazy (prawdopodobnie brak połączenia)"));
        }
    };

    /* LOGIKA SUWAKÓV (SLIDERS) */
    function initSlider(id, callback) {
        const handle = document.getElementById(id);
        const container = handle.parentElement;
        let isDragging = false;

        handle.addEventListener('touchstart', (e) => isDragging = true);
        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            let x = e.touches[0].clientX - container.getBoundingClientRect().left - 30;
            x = Math.max(0, Math.min(x, container.offsetWidth - 65));
            handle.style.left = x + 'px';
            
            if (x > container.offsetWidth - 80) {
                isDragging = false;
                handle.style.left = '5px';
                callback();
            }
        });
        window.addEventListener('touchend', () => {
            isDragging = false;
            handle.style.left = '5px';
        });
    }

    initSlider('finish-handle', () => {
        document.getElementById('final-time').innerText = document.getElementById('trip-timer').innerText;
        document.getElementById('final-people').innerText = app.state.maxPeople;
        app.nav('scr-pay');
    });

    initSlider('logout-handle', () => {
        location.reload(); // Proste wylogowanie przez przeładowanie
    });

    initSlider('pause-handle', () => {
        alert("Rozpoczęto przerwę!");
        app.send('PRZERWA', { kierowca: app.state.driver, typ_przerwy: 'START', gps: 'Baza' });
    });
</script>

</body>
</html>
